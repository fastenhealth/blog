media:
  - name: images
    label: Images
    input: assets/images
    output: assets/images
    categories: [image]
    extensions: [png, jpg, jpeg, gif, webp, svg, ico]
    rename: safe
  - name: media
    label: Media
    input: assets/media
    output: /assets/media
    categories: [video, audio]
    rename: safe

content:
  - name: posts
    label: Blog posts
    type: collection
    operations:
      rename: false
      delete: false
    path: _posts
    format: yaml-frontmatter
    filename:
      template: "{year}-{month}-{day}-REPLACE-ME-LOWERCASE.md"
      field: create
    view:
      fields: [image, title, date, categories, tags, author]
      primary: title
      sort: [date, title]
      search: [title, categories, tags, author, body]
      default:
        sort: date
        order: desc
    fields:
      - name: layout
        type: select
        default: post
        hidden: true
        options:
          values: [post]
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Publish date
        type: date
        required: true
        options:
          time: true
          format: yyyy-MM-dd HH:mm:ss
          step: 60
      - name: image
        label: Featured image
        type: image
        options:
          media: images
          path: assets/images
          categories: [image]
          rename: safe
      - name: categories
        label: Categories
        type: select
        options:
          multiple: true
          values:
            - name: update
              label: Update
            - name: guidebook
              label: Guidebook
            - name: philosophy
              label: Philosophy
      - name: tags
        label: Tags
        type: select
        options:
          multiple: true
          values:
            - name: carin
              label: CARIN
            - name: cms
              label: CMS
            - name: featured
              label: Featured
            - name: information-blocking
              label: Information blocking
            - name: legal
              label: Legal
            - name: opensource
              label: Open source
            - name: sticky
              label: Sticky
            - name: tefca
              label: TEFCA
      - name: author
        label: Author
        type: select
        default: jason
        options:
          values:
            - name: jason
              label: Jason Kulatunga
      - name: navigation
        label: Show in navigation
        type: boolean
        default: false
      - name: body
        label: Body
        type: rich-text
        options:
          format: markdown
          media: uploads
          path: assets/images/uploads
          rename: safe
          switcher: true

settings:
  content:
    merge: true
  commit:
    identity: app
    templates:
      create: "content(create): {path}"
      update: "content(update): {path}"
      delete: "content(delete): {path}"
      rename: "content(rename): {oldPath} -> {newPath}"
