media:
  - name: images
    label: Images
    input: assets/images
    output: assets/images
    categories: [image]
    extensions: [png, jpg, jpeg, gif, webp, svg, ico]
    rename: safe
  - name: media
    label: Media
    input: assets/media
    output: /assets/media
    categories: [video, audio]
    rename: safe

content:
  - name: posts
    label: Blog posts
    type: collection
    path: _posts
    format: yaml-frontmatter
    filename:
      template: "{year}-{month}-{day}-{title}.md"
      field: create
    view:
      fields: [image, title, date, categories, tags, author]
      primary: title
      sort: [date, title]
      search: [title, categories, tags, author, body]
      default:
        sort: date
        order: desc
    fields:
      - name: layout
        type: select
        default: post
        hidden: true
        options:
          values: [post]
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Publish date
        type: date
        required: true
        options:
          time: true
          format: yyyy-MM-dd HH:mm:ss
          step: 60
      - name: image
        label: Featured image
        type: image
        options:
          media: images
          path: assets/images
          categories: [image]
          rename: safe
      - name: categories
        label: Categories
        type: select
        options:
          multiple: true
          values:
            - name: update
              label: Update
            - name: guidebook
              label: Guidebook
            - name: philosophy
              label: Philosophy
      - name: tags
        label: Tags
        type: select
        options:
          multiple: true
          values:
            - name: carin
              label: CARIN
            - name: cms
              label: CMS
            - name: featured
              label: Featured
            - name: information-blocking
              label: Information blocking
            - name: legal
              label: Legal
            - name: opensource
              label: Open source
            - name: sticky
              label: Sticky
            - name: tefca
              label: TEFCA
      - name: author
        label: Author
        type: select
        default: jason
        options:
          values:
            - name: jason
              label: Jason Kulatunga
      - name: navigation
        label: Show in navigation
        type: boolean
        default: false
      - name: body
        label: Body
        type: rich-text
        options:
          format: markdown
          media: uploads
          path: assets/images/uploads
          rename: safe
          switcher: true

  - name: pages
    label: Pages
    type: collection
    path: _pages
    format: yaml-frontmatter
    filename:
      template: "{title}.md"
      field: create
    view:
      fields: [title, permalink, layout]
      primary: title
      sort: [title, permalink]
      search: [title, permalink, body]
      default:
        sort: title
        order: asc
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: layout
        label: Layout
        type: select
        default: page
        options:
          values: [page, default, page-sidebar]
      - name: permalink
        label: Permalink
        type: string
        required: true
        pattern:
          regex: "^/.+"
          message: "Permalinks should start with /"
      - name: body
        label: Body
        type: code

  - name: settings
    label: Settings
    type: group
    items:
      - name: site
        label: Site settings
        type: file
        path: _config.yml
        format: yaml
        operations:
          delete: false
        fields:
          - name: name
            label: Site name
            type: string
            required: true
          - name: description
            label: Description
            type: text
          - name: logo
            label: Logo
            type: image
            options:
              media: images
              path: assets/images
              categories: [image]
          - name: favicon
            label: Favicon
            type: image
            options:
              media: images
              path: assets/images
              extensions: [ico, png]
          - name: email
            label: Contact email
            type: string
          - name: disqus
            label: Disqus shortname
            type: string
          - name: short_url
            label: Short URL
            type: string
          - name: production_url
            label: Production URL
            type: string
          - name: source_url
            label: Source URL
            type: string
          - name: language
            label: Language
            type: string
          - name: paginate
            label: Posts per page
            type: number
          - name: authors
            label: Authors
            type: object
            fields:
              - name: jason
                label: Jason Kulatunga
                type: object
                fields:
                  - name: name
                    label: Name
                    type: string
                  - name: site
                    label: Website
                    type: string
                  - name: avatar
                    label: Avatar
                    type: image
                    options:
                      media: images
                      path: assets/images
                      categories: [image]
                  - name: bio
                    label: Bio
                    type: text
                  - name: email
                    label: Email
                    type: string
                  - name: twitter
                    label: Twitter
                    type: string
                  - name: linkedin
                    label: LinkedIn
                    type: string

  - name: special
    label: Special files
    type: group
    items:
      - name: home
        label: Home page
        type: file
        path: index.html
        format: code
        operations:
          delete: false
      - name: not_found
        label: 404 page
        type: file
        path: 404.html
        format: code
        operations:
          delete: false

settings:
  content:
    merge: true
  commit:
    identity: app
    templates:
      create: "content(create): {path}"
      update: "content(update): {path}"
      delete: "content(delete): {path}"
      rename: "content(rename): {oldPath} -> {newPath}"
